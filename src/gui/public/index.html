<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendrome — Week View</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --hour-height: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  header h1 { font-size: 1rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .nav-btn:hover { border-color: var(--accent); }
  .nav-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, var(--surface)); }
  .week-label { font-size: 0.85rem; color: var(--text-muted); min-width: 130px; text-align: center; }
  .nav-group { display: flex; align-items: center; gap: 6px; }

  /* Budget bar */
  .budgets { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .budget-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 160px;
    flex: 1;
  }
  .budget-card h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .budget-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; display: flex; position: relative; }
  /* Spent (done) = solid; scheduled (planned) = diagonal hatch; the
     over-budget portion of either keeps its texture but goes red (#28). */
  .budget-seg { height: 100%; transition: width 0.3s; }
  .budget-seg.spent { background: var(--c); }
  .budget-seg.sched { background: repeating-linear-gradient(45deg, var(--c) 0 3px, color-mix(in srgb, var(--c) 30%, transparent) 3px 6px); }
  .budget-seg.spent.over { background: #f85149; }
  .budget-seg.sched.over { background: repeating-linear-gradient(45deg, #f85149 0 3px, color-mix(in srgb, #f85149 30%, transparent) 3px 6px); }
  .budget-mark { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--bg); }
  .budget-label { font-size: 0.75rem; color: var(--text-muted); }
  .over-budget { color: #f85149; }

  /* ===== COMPACT VIEW ===== */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  @media (max-width: 900px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
  }
  .day-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    display: flex;
    justify-content: space-between;
  }
  .day-header .name { font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .day-header .hours { color: var(--text-muted); font-weight: 400; }
  .day-body { padding: 6px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .today { border-color: var(--accent); }

  /* Blocks (shared between views) */
  .block {
    border-radius: 3px;
    padding: 6px 8px;
    font-size: 0.72rem;
    line-height: 1.35;
    border-left: 3px solid var(--c, var(--accent));
    background: repeating-linear-gradient(
      45deg,
      color-mix(in srgb, var(--c) 18%, transparent) 0 5px,
      color-mix(in srgb, var(--c) 6%, transparent) 5px 10px
    );
    overflow: hidden;
  }
  .block .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block .meta { color: var(--text-muted); font-size: 0.65rem; margin-top: 2px; letter-spacing: 0.02em; }
  .block.habit { opacity: 0.7; font-style: italic; }
  .block.meeting {
    background: color-mix(in srgb, var(--c) 30%, transparent);
    border-left: 3px solid var(--c, var(--accent));
  }
  .block.logged {
    background: color-mix(in srgb, var(--c) 22%, transparent);
  }
  /* Deadline marker — an unplaced task's due date. Deliberately not a
     duration block: deadlines mark when something is owed, placements
     mark when you'll do it (#79). */
  .block.deadline {
    background: transparent;
    border-left-style: dashed;
    opacity: 0.85;
  }
  /* Past UNCONFIRMED placement / gcal-sync entries: visual "needs review"
     cue. The fix lives in MCP (/calendrome:today); the GUI just flags. */
  .block.overdue-review {
    border-left-color: #ff8c00;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, #ff8c00 45%, transparent);
  }
  .block.overdue-review .title::before {
    content: '⚠ ';
    color: #ff8c00;
  }
  .empty { color: var(--text-muted); font-size: 0.75rem; padding: 20px 12px; text-align: center; }

  /* ===== TIMELINE VIEW ===== */
  .timeline-container { display: none; }
  .timeline-container.visible { display: grid; grid-template-columns: 50px repeat(7, 1fr); gap: 0; }

  .timeline-hours {
    padding-top: 38px; /* align with day headers */
  }
  .timeline-hour-label {
    height: var(--hour-height);
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: right;
    padding-right: 8px;
    position: relative;
  }
  .timeline-hour-label::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 1px;
    background: var(--border);
  }

  .timeline-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    position: relative;
  }
  .timeline-day:last-child { border-right: 1px solid var(--border); }
  .timeline-day.today { border-color: var(--accent); }

  .timeline-day-header {
    padding: 10px 8px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  .timeline-day-header .hours { font-weight: 400; color: var(--text-muted); }

  .timeline-body {
    position: relative;
  }

  .timeline-hour-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--border);
  }

  .timeline-block {
    position: absolute;
    left: 4px;
    right: 4px;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 0.65rem;
    line-height: 1.3;
    border-left: 3px solid var(--c, var(--accent));
    background: repeating-linear-gradient(
      45deg,
      color-mix(in srgb, var(--c) 18%, transparent) 0 5px,
      color-mix(in srgb, var(--c) 6%, transparent) 5px 10px
    );
    overflow: hidden;
    z-index: 2;
    min-height: 20px;
  }
  .timeline-block .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timeline-block .meta { color: var(--text-muted); font-size: 0.6rem; }
  .timeline-block.habit { opacity: 0.7; font-style: italic; }
  .timeline-block.logged {
    background: color-mix(in srgb, var(--c) 22%, transparent);
  }
  .timeline-block.meeting {
    background: color-mix(in srgb, var(--c) 30%, transparent);
  }
  /* See `.block.overdue-review` — same intent for the timeline view. */
  .timeline-block.overdue-review {
    border-left-color: #ff8c00;
    box-shadow: inset 0 0 0 1px color-mix(in srgb, #ff8c00 45%, transparent);
  }
  .timeline-block.overdue-review .title::before {
    content: '⚠ ';
    color: #ff8c00;
  }

  .now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #f85149;
    z-index: 10;
  }
  .now-line::before {
    content: '';
    position: absolute;
    left: -4px;
    top: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f85149;
  }

  /* Floating tasks (no time) above timeline */
  .floating-tasks {
    margin-bottom: 8px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .floating-tasks .block { flex: 0 0 auto; max-width: 200px; }
  .floating-tasks:empty { display: none; }

  /* Pending-tasks drawer (#85) */
  .tasks-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 340px;
    max-width: 90vw;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 24px rgba(0,0,0,0.35);
    display: none;
    flex-direction: column;
    z-index: 20;
  }
  .tasks-panel.open { display: flex; }
  .tasks-panel-head, .tasks-panel-tabs {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .tasks-panel-head .spacer { flex: 1; }
  .tasks-panel .tp-search {
    margin: 10px 12px 0;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.8rem;
  }
  .tasks-panel-body { padding: 12px; overflow-y: auto; flex: 1; }
  .tasks-panel a.nav-btn { text-decoration: none; }
  .task-group { margin-bottom: 16px; }
  .task-group-head {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 6px;
    font-weight: 600;
  }
  .count-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 6px;
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-left: 4px;
  }
  .task-row {
    border: 1px solid var(--border);
    border-left: 3px solid var(--c, var(--accent));
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 7px;
    background: var(--bg);
  }
  .task-row-main { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .task-title { font-weight: 500; }
  .task-dur { color: var(--text-muted); font-size: 0.72rem; white-space: nowrap; }
  .task-row-meta { display: flex; gap: 6px; align-items: center; margin-top: 5px; flex-wrap: wrap; }
  .task-proj {
    font-size: 0.65rem;
    color: var(--c, var(--accent));
    border: 1px solid color-mix(in srgb, var(--c, var(--accent)) 40%, var(--border));
    border-radius: 10px;
    padding: 1px 7px;
  }
  .task-status {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
  }
  .task-status.status-IN_PROGRESS { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
  .task-due { font-size: 0.65rem; color: var(--text-muted); }
  .tasks-panel .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Calendrome</h1>
  <div class="nav-group">
    <button class="nav-btn" id="prev" aria-label="Previous week">←</button>
    <span class="week-label" id="week-label"></span>
    <button class="nav-btn" id="next" aria-label="Next week">→</button>
    <button class="nav-btn" id="today-btn">Today</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="nav-btn active" id="btn-compact">Compact</button>
    <button class="nav-btn" id="btn-timeline">Timeline</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <!-- Work view is the screen-share-safe default. "All" reveals everything. -->
    <button class="nav-btn active" id="btn-cat-work" title="Show only work projects (screen-share safe)">Work</button>
    <button class="nav-btn" id="btn-cat-all" title="Show every category">All</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
    <button class="nav-btn" id="btn-tasks-panel" title="Show pending tasks">Tasks</button>
  </div>
</header>

<div class="budgets" id="budgets"></div>
<div class="floating-tasks" id="floating"></div>
<div class="week-grid" id="grid"></div>
<div class="timeline-container" id="timeline"></div>

<!-- Pending-tasks drawer (#85). Fixed-position so it overlays without
     disturbing the week layout. Populated from /api/tasks. -->
<aside class="tasks-panel" id="tasks-panel" aria-hidden="true">
  <div class="tasks-panel-head">
    <strong>Pending tasks</strong>
    <span class="spacer"></span>
    <a class="nav-btn" href="/tasks" title="Open full-page tasks view">⤢</a>
    <button class="nav-btn" id="tasks-panel-close" aria-label="Close">✕</button>
  </div>
  <div class="tasks-panel-tabs">
    <button class="nav-btn active" id="tp-tab-priorities">Priorities</button>
    <button class="nav-btn" id="tp-tab-tasks">Tasks</button>
  </div>
  <input type="search" id="tp-search" class="tp-search hidden" placeholder="Search tasks…" />
  <div class="tasks-panel-body" id="tasks-panel-body"></div>
</aside>

<script src="/tasks-ui.js"></script>
<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const PALETTE = [
  '#58a6ff','#3fb950','#d29922','#f85149','#bc8cff',
  '#79c0ff','#56d364','#e3b341','#ff7b72','#d2a8ff',
];
const HOUR_START = 7;  // 7 AM
const HOUR_END = 22;   // 10 PM
const HOUR_COUNT = HOUR_END - HOUR_START;
const HOUR_PX = 60;

let projectColors = {};
// projectId → category_id, populated by loadProjects()
let projectCategory = {};
let weekStart = getMonday(new Date());
let viewMode = localStorage.getItem('calendrome-view') || 'compact';
// Default to "work" so casual screen-shares never leak personal stuff.
// Toggle to "all" when you actually want to see everything.
let categoryView = localStorage.getItem('calendrome-category-view') || 'work';
let weekData = null;

// Local-timezone ISO date. Never use toISOString() for day bucketing:
// it shifts to UTC, so evenings (UTC-) label tomorrow as today and
// mornings (UTC+) label yesterday (#82).
function localISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  dt.setDate(diff);
  return localISODate(dt);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return localISODate(d);
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// True when a calendar event (gcal-sync time_entry) is past its start
// and still UNCONFIRMED — surfaces as a "needs review" cue in both views.
// The fix is in MCP (e.g. /calendrome:today → complete_task / confirm),
// not in the GUI; this is purely indicative.
function isOverdueEvent(ce) {
  if (!ce || ce.status !== 'UNCONFIRMED') return false;
  return Date.parse(ce.start) < Date.now();
}

// True when a placement's start has passed and it's still UNCONFIRMED
// — the entry awaits confirmation in the day-end review flow.
function isOverduePlacement(p) {
  if (!p || p.status !== 'UNCONFIRMED') return false;
  return Date.parse(p.start_at) < Date.now();
}

function getColor(projectId) {
  if (!projectColors[projectId]) {
    const idx = Object.keys(projectColors).length % PALETTE.length;
    projectColors[projectId] = PALETTE[idx];
  }
  return projectColors[projectId];
}

function fmtHours(min) {
  if (!min) return '0h';
  const h = min / 60;
  return Number(h.toFixed(1)) + 'h';
}

function fmtTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
}

function timeToOffset(isoStr) {
  const d = new Date(isoStr);
  const hours = d.getHours() + d.getMinutes() / 60;
  return (hours - HOUR_START) * HOUR_PX;
}

function durationToPx(minutes) {
  return (minutes / 60) * HOUR_PX;
}

function setView(mode) {
  viewMode = mode;
  localStorage.setItem('calendrome-view', mode);
  document.getElementById('btn-compact').classList.toggle('active', mode === 'compact');
  document.getElementById('btn-timeline').classList.toggle('active', mode === 'timeline');
  document.getElementById('grid').style.display = mode === 'compact' ? 'grid' : 'none';
  document.getElementById('timeline').classList.toggle('visible', mode === 'timeline');
  document.getElementById('floating').style.display = mode === 'timeline' ? 'flex' : 'none';
  if (weekData) renderView(weekData);
}

async function loadProjects() {
  const res = await fetch('/api/projects');
  const projects = await res.json();
  projectColors = {};
  projectCategory = {};
  for (let i = 0; i < projects.length; i++) {
    const p = projects[i];
    projectColors[p.id] = p.color || PALETTE[i % PALETTE.length];
    // Treat missing category_id as 'work' to match the migration backfill.
    projectCategory[p.id] = p.category_id || 'work';
  }
}

// Returns true if a project (or unassigned thing) should be visible
// under the active category view.
function visibleInCurrentView(projectId) {
  if (categoryView === 'all') return true;
  if (!projectId) return true; // unassigned — always show
  return projectCategory[projectId] === categoryView;
}

// Filter the /api/week payload down to the active category view. Server
// returns everything; the client drops what shouldn't be visible. Keeps
// the API simple and the toggle instant.
function filterWeekData(data) {
  if (categoryView === 'all') return data;
  return {
    ...data,
    tasks: data.tasks.filter((t) => visibleInCurrentView(t.project_id)),
    habit_instances: data.habit_instances.filter((h) =>
      visibleInCurrentView(h.project_id),
    ),
    placements: (data.placements || []).filter((p) =>
      visibleInCurrentView(p.project_id),
    ),
    time_logs: data.time_logs.filter((tl) =>
      visibleInCurrentView(tl.project_id),
    ),
    calendar_events: (data.calendar_events || []).filter((ce) =>
      visibleInCurrentView(ce.project_id),
    ),
    budgets: data.budgets.filter((b) => visibleInCurrentView(b.project_id)),
  };
}

function setCategoryView(view) {
  categoryView = view;
  localStorage.setItem('calendrome-category-view', view);
  document.getElementById('btn-cat-work').classList.toggle('active', view === 'work');
  document.getElementById('btn-cat-all').classList.toggle('active', view === 'all');
  if (weekData) renderView(filterWeekData(weekData));
  // Keep the pending-tasks drawer in sync with the Work/All filter.
  if (typeof tpLoaded !== 'undefined' && tpLoaded) tpRender();
}

function buildDays(data) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const date = addDays(weekStart, i);
    days.push({ date, placed: [], deadlines: [], habits: [], logs: [], meetings: [], totalMin: 0 });
  }
  // Placements (UNCONFIRMED time_entry rows) are the planned blocks.
  // task.due never positions a block — it's a pure deadline (#79).
  for (const p of (data.placements || [])) {
    const day = days.find(d => d.date === p.start_at.slice(0,10));
    if (day) {
      day.placed.push(p);
      day.totalMin += p.duration_minutes || 0;
    }
  }
  // Unplaced tasks with a due date in the week surface as deadline
  // markers — visible, but never duration blocks on the calendar.
  const placedTaskIds = new Set((data.placements || []).map(p => p.task_id));
  for (const t of data.tasks) {
    if (!t.due || t.status === 'ARCHIVED' || placedTaskIds.has(t.id)) continue;
    const day = days.find(d => d.date === t.due.slice(0,10));
    if (day) day.deadlines.push(t);
  }
  for (const hi of data.habit_instances) {
    const day = days.find(d => d.date === hi.scheduled_start.slice(0,10));
    if (day) {
      day.habits.push(hi);
      day.totalMin += hi.habit_duration || 0;
    }
  }
  for (const tl of data.time_logs) {
    const day = days.find(d => d.date === tl.started_at.slice(0,10));
    if (day && tl.duration_minutes) day.logs.push(tl);
  }
  for (const ce of (data.calendar_events || [])) {
    const day = days.find(d => d.date === ce.start.slice(0,10));
    if (day) {
      day.meetings.push(ce);
      day.totalMin += ce.duration_minutes || 0;
    }
  }
  return days;
}

function renderBudgets(data) {
  const budgetsEl = document.getElementById('budgets');
  budgetsEl.innerHTML = '';
  for (const b of data.budgets) {
    const alloc = b.allocated_minutes;
    const spent = b.spent_minutes;
    const sched = b.scheduled_minutes;
    const used = spent + sched;
    const color = getColor(b.project_id);

    // Track spans max(budget, used); when over budget the overflow
    // portion of each segment renders red and a marker shows where
    // the budget line sits (#28). Segment order: spent fills first
    // (it already happened), scheduled stacks after it.
    const track = alloc ? Math.max(alloc, used) : used;
    const w = (m) => (track ? (m / track) * 100 : 0);
    const spentIn = alloc ? Math.min(spent, alloc) : spent;
    const schedIn = alloc ? Math.min(sched, Math.max(0, alloc - spent)) : sched;
    const over = alloc ? used > alloc : false;
    const overLabel = over ? ` (+${Math.round((used / alloc - 1) * 100)}%)` : '';
    const mark = over ? `<div class="budget-mark" style="left:${w(alloc)}%"></div>` : '';

    budgetsEl.innerHTML += `
      <div class="budget-card">
        <h3 style="color:${color}">${b.project_id}</h3>
        <div class="budget-bar" style="--c:${color}">
          <div class="budget-seg spent" style="width:${w(spentIn)}%"></div>
          <div class="budget-seg spent over" style="width:${w(spent - spentIn)}%"></div>
          <div class="budget-seg sched" style="width:${w(schedIn)}%"></div>
          <div class="budget-seg sched over" style="width:${w(sched - schedIn)}%"></div>
          ${mark}
        </div>
        <div class="budget-label ${over ? 'over-budget' : ''}">${fmtHours(spent)} done · ${fmtHours(sched)} planned · ${alloc ? fmtHours(alloc) : '∞'} budget${overLabel}</div>
      </div>`;
  }
}

function renderCompact(days) {
  const todayStr = localISODate(new Date());
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = days[i];
    const isToday = d.date === todayStr;
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');
    col.innerHTML = `
      <div class="day-header">
        <span class="name">${DAYS[i]} ${fmtDate(d.date)}</span>
        <span class="hours">${fmtHours(d.totalMin)}</span>
      </div>
      <div class="day-body"></div>`;
    grid.appendChild(col);
    const body = col.querySelector('.day-body');

    for (const ce of d.meetings) {
      const c = ce.project_id ? getColor(ce.project_id) : '#8b949e';
      const overdue = isOverdueEvent(ce) ? ' overdue-review' : '';
      body.innerHTML += `<div class="block meeting${overdue}" style="--c:${c}"><div class="title">${ce.summary}</div><div class="meta">${fmtTime(ce.start)} – ${fmtTime(ce.end)}</div></div>`;
    }
    for (const hi of d.habits) {
      const c = getColor(hi.project_id);
      body.innerHTML += `<div class="block habit" style="--c:${c}"><div class="title">${hi.habit_title}</div><div class="meta">${fmtHours(hi.habit_duration)}</div></div>`;
    }
    for (const p of d.placed) {
      const c = getColor(p.project_id);
      const overdue = isOverduePlacement(p) ? ' overdue-review' : '';
      body.innerHTML += `<div class="block${overdue}" style="--c:${c}"><div class="title">${p.task_title}</div><div class="meta">${fmtHours(p.duration_minutes)} · ${p.priority} · ${p.project_id}</div></div>`;
    }
    for (const t of d.deadlines) {
      const c = getColor(t.project_id);
      body.innerHTML += `<div class="block deadline" style="--c:${c}"><div class="title">${t.title}</div><div class="meta">due · ${t.project_id}</div></div>`;
    }
    for (const tl of d.logs) {
      const c = getColor(tl.project_id);
      body.innerHTML += `<div class="block logged" style="--c:${c}"><div class="title">${tl.task_title ?? tl.notes ?? '(untitled)'}</div><div class="meta">${fmtHours(tl.duration_minutes)} logged at ${fmtTime(tl.started_at)}</div></div>`;
    }
    if (!d.meetings.length && !d.habits.length && !d.placed.length && !d.deadlines.length && !d.logs.length) {
      body.innerHTML += '<div class="empty">No items</div>';
    }
  }
}

function renderTimeline(days) {
  const todayStr = localISODate(new Date());
  const totalHeight = HOUR_COUNT * HOUR_PX;
  const tl = document.getElementById('timeline');
  const floating = document.getElementById('floating');
  tl.innerHTML = '';
  floating.innerHTML = '';

  // Hour labels column
  let hoursHtml = '<div class="timeline-hours">';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    const label = h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h-12}p`;
    hoursHtml += `<div class="timeline-hour-label">${label}</div>`;
  }
  hoursHtml += '</div>';
  tl.innerHTML += hoursHtml;

  // Deadline markers: unplaced tasks with a due date this week. They
  // never become timeline blocks — only this floating strip (#79).
  for (const d of days) {
    for (const t of d.deadlines) {
      const c = getColor(t.project_id);
      floating.innerHTML += `<div class="block deadline" style="--c:${c}"><div class="title">${t.title}</div><div class="meta">due ${fmtDate(t.due.slice(0,10))} · ${t.project_id}</div></div>`;
    }
  }

  // Day columns
  for (let i = 0; i < 7; i++) {
    const d = days[i];
    const isToday = d.date === todayStr;

    let dayHtml = `<div class="timeline-day${isToday ? ' today' : ''}">`;
    dayHtml += `<div class="timeline-day-header"><span>${DAYS[i]} ${fmtDate(d.date)}</span><span class="hours">${fmtHours(d.totalMin)}</span></div>`;
    dayHtml += `<div class="timeline-body" style="height:${totalHeight}px">`;

    // Hour gridlines
    for (let h = 0; h < HOUR_COUNT; h++) {
      dayHtml += `<div class="timeline-hour-line" style="top:${h * HOUR_PX}px"></div>`;
    }

    // Habit instances
    for (const hi of d.habits) {
      const c = getColor(hi.project_id);
      const top = timeToOffset(hi.scheduled_start);
      const height = durationToPx(hi.habit_duration || 30);
      if (top < 0 || top >= totalHeight) continue;
      dayHtml += `<div class="timeline-block habit" style="--c:${c};top:${top}px;height:${height}px">
        <div class="title">${hi.habit_title}</div>
        ${height > 30 ? `<div class="meta">${fmtHours(hi.habit_duration)}</div>` : ''}
      </div>`;
    }

    // Calendar events (meetings)
    for (const ce of d.meetings) {
      const c = ce.project_id ? getColor(ce.project_id) : '#8b949e';
      const top = timeToOffset(ce.start);
      const height = durationToPx(ce.duration_minutes);
      if (top < 0 || top >= totalHeight) continue;
      const overdue = isOverdueEvent(ce) ? ' overdue-review' : '';
      dayHtml += `<div class="timeline-block meeting${overdue}" style="--c:${c};top:${top}px;height:${height}px">
        <div class="title">${ce.summary}</div>
        ${height > 30 ? `<div class="meta">${fmtTime(ce.start)} – ${fmtTime(ce.end)}</div>` : ''}
      </div>`;
    }

    // Placements (UNCONFIRMED time_entry rows) — the planned blocks
    for (const p of d.placed) {
      const c = getColor(p.project_id);
      const top = timeToOffset(p.start_at);
      const height = durationToPx(p.duration_minutes);
      if (top < 0 || top >= totalHeight) continue;
      const overdue = isOverduePlacement(p) ? ' overdue-review' : '';
      dayHtml += `<div class="timeline-block${overdue}" style="--c:${c};top:${top}px;height:${height}px">
        <div class="title">${p.task_title}</div>
        ${height > 30 ? `<div class="meta">${fmtHours(p.duration_minutes)} · ${p.project_id}</div>` : ''}
      </div>`;
    }

    // Time logs
    for (const log of d.logs) {
      const c = getColor(log.project_id);
      const top = timeToOffset(log.started_at);
      const height = durationToPx(log.duration_minutes);
      if (top < 0 || top >= totalHeight) continue;
      dayHtml += `<div class="timeline-block logged" style="--c:${c};top:${top}px;height:${height}px">
        <div class="title">${log.task_title ?? log.notes ?? '(untitled)'}</div>
        ${height > 30 ? `<div class="meta">${fmtHours(log.duration_minutes)} logged</div>` : ''}
      </div>`;
    }

    // Now line (today only)
    if (isToday) {
      const now = new Date();
      const nowHours = now.getHours() + now.getMinutes() / 60;
      if (nowHours >= HOUR_START && nowHours < HOUR_END) {
        const top = (nowHours - HOUR_START) * HOUR_PX;
        dayHtml += `<div class="now-line" style="top:${top}px"></div>`;
      }
    }

    dayHtml += '</div></div>';
    tl.innerHTML += dayHtml;
  }
}

function renderView(data) {
  const days = buildDays(data);
  renderBudgets(data);
  if (viewMode === 'compact') {
    renderCompact(days);
  } else {
    renderTimeline(days);
  }
}

async function render() {
  await loadProjects();
  const res = await fetch(`/api/week?start=${weekStart}`);
  weekData = await res.json();
  document.getElementById('week-label').textContent =
    `${fmtDate(weekData.start)} – ${fmtDate(weekData.end)}`;
  renderView(filterWeekData(weekData));
}

// Navigation
document.getElementById('prev').onclick = () => { weekStart = addDays(weekStart, -7); render(); };
document.getElementById('next').onclick = () => { weekStart = addDays(weekStart, 7); render(); };
document.getElementById('today-btn').onclick = () => { weekStart = getMonday(new Date()); render(); };

// View toggle
document.getElementById('btn-compact').onclick = () => setView('compact');
document.getElementById('btn-timeline').onclick = () => setView('timeline');

// Category toggle (Work / All)
document.getElementById('btn-cat-work').onclick = () => setCategoryView('work');
document.getElementById('btn-cat-all').onclick = () => setCategoryView('all');

// ---- Pending-tasks drawer (#85) ----
// Read-only: lists pending tasks (NEW/IN_PROGRESS/SCHEDULED) from
// /api/tasks. Respects the same Work/All category filter as the week
// view. Loads lazily the first time it's opened.
let tpTasks = [];
let tpMeta = {};
let tpTab = 'priorities';
let tpLoaded = false;

function tpVisibleTasks() {
  if (categoryView === 'all') return tpTasks;
  return tpTasks.filter((t) => (tpMeta[t.project_id]?.category_id || 'work') === categoryView);
}

function tpRender() {
  const body = document.getElementById('tasks-panel-body');
  const search = document.getElementById('tp-search');
  const tasks = tpVisibleTasks();
  if (tpTab === 'priorities') {
    search.classList.add('hidden');
    window.TasksUI.renderPriorities(body, tasks, tpMeta);
  } else {
    search.classList.remove('hidden');
    window.TasksUI.renderUpNext(body, tasks, tpMeta, { search: search.value, sort: 'priority' });
  }
}

async function tpLoad() {
  if (tpLoaded) return;
  tpLoaded = true;
  const [projects, resp] = await Promise.all([
    fetch('/api/projects').then((r) => r.json()),
    fetch('/api/tasks').then((r) => r.json()),
  ]);
  tpMeta = {};
  for (const p of projects) {
    tpMeta[p.id] = { name: p.name, color: p.color, category_id: p.category_id || 'work' };
  }
  tpTasks = resp.tasks || [];
  tpRender();
}

function tpSetTab(next) {
  tpTab = next;
  document.getElementById('tp-tab-priorities').classList.toggle('active', next === 'priorities');
  document.getElementById('tp-tab-tasks').classList.toggle('active', next === 'tasks');
  tpRender();
}

function tpToggle() {
  const panel = document.getElementById('tasks-panel');
  const open = panel.classList.toggle('open');
  panel.setAttribute('aria-hidden', open ? 'false' : 'true');
  document.getElementById('btn-tasks-panel').classList.toggle('active', open);
  if (open) tpLoad();
}

document.getElementById('btn-tasks-panel').onclick = tpToggle;
document.getElementById('tasks-panel-close').onclick = tpToggle;
document.getElementById('tp-tab-priorities').onclick = () => tpSetTab('priorities');
document.getElementById('tp-tab-tasks').onclick = () => tpSetTab('tasks');
document.getElementById('tp-search').addEventListener('input', tpRender);

// Init
setView(viewMode);
setCategoryView(categoryView);
render();
</script>
</body>
</html>
