<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calendrome — Tasks</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }
  header h1 {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0;
  }
  .nav-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .nav-btn:hover { border-color: var(--accent); }
  .nav-btn.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, var(--surface)); }
  a.nav-btn { text-decoration: none; }
  .spacer { flex: 1; }
  main { max-width: 880px; margin: 0 auto; padding: 20px; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .controls input, .controls select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.8rem;
  }
  .controls input { flex: 1; min-width: 180px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .task-group { margin-bottom: 20px; }
  .task-group-head {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .count-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 7px;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 4px;
  }
  .task-row {
    border: 1px solid var(--border);
    border-left: 3px solid var(--c, var(--accent));
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--surface);
  }
  .task-row-main { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .task-title { font-weight: 500; }
  .task-dur { color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; }
  .task-row-meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
  .task-proj {
    font-size: 0.68rem;
    color: var(--c, var(--accent));
    border: 1px solid color-mix(in srgb, var(--c, var(--accent)) 40%, var(--border));
    border-radius: 10px;
    padding: 1px 8px;
  }
  .task-status {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
  }
  .status-IN_PROGRESS { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
  .task-due { font-size: 0.68rem; color: var(--text-muted); }
  .empty { color: var(--text-muted); font-size: 0.8rem; padding: 24px 12px; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>Calendrome</h1>
  <a class="nav-btn" href="/">← Week</a>
  <span class="spacer"></span>
  <button class="nav-btn active" id="tab-priorities">Priorities</button>
  <button class="nav-btn" id="tab-tasks">Tasks</button>
</header>

<main>
  <div class="controls" id="controls">
    <input type="search" id="search" placeholder="Search tasks…" />
    <select id="project-filter"><option value="">All projects</option></select>
    <select id="sort">
      <option value="priority">Sort: Priority</option>
      <option value="due">Sort: Due date</option>
      <option value="duration">Sort: Duration</option>
    </select>
  </div>
  <div id="priorities-view"></div>
  <div id="tasks-view" class="hidden"></div>
</main>

<script src="/tasks-ui.js"></script>
<script>
let TASKS = [];
let PROJECT_META = {};
let tab = 'priorities';

async function load() {
  const [projects, tasksResp] = await Promise.all([
    fetch('/api/projects').then((r) => r.json()),
    fetch('/api/tasks').then((r) => r.json()),
  ]);
  PROJECT_META = {};
  const sel = document.getElementById('project-filter');
  for (const p of projects) {
    PROJECT_META[p.id] = { name: p.name, color: p.color, category_id: p.category_id };
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  }
  TASKS = tasksResp.tasks || [];
  render();
}

function render() {
  const prioView = document.getElementById('priorities-view');
  const tasksView = document.getElementById('tasks-view');
  const controls = document.getElementById('controls');
  if (tab === 'priorities') {
    prioView.classList.remove('hidden');
    tasksView.classList.add('hidden');
    controls.classList.add('hidden');
    TasksUI.renderPriorities(prioView, TASKS, PROJECT_META);
  } else {
    prioView.classList.add('hidden');
    tasksView.classList.remove('hidden');
    controls.classList.remove('hidden');
    TasksUI.renderUpNext(tasksView, TASKS, PROJECT_META, {
      search: document.getElementById('search').value,
      projectFilter: document.getElementById('project-filter').value,
      sort: document.getElementById('sort').value,
    });
  }
}

function setTab(next) {
  tab = next;
  document.getElementById('tab-priorities').classList.toggle('active', next === 'priorities');
  document.getElementById('tab-tasks').classList.toggle('active', next === 'tasks');
  render();
}

document.getElementById('tab-priorities').addEventListener('click', () => setTab('priorities'));
document.getElementById('tab-tasks').addEventListener('click', () => setTab('tasks'));
document.getElementById('search').addEventListener('input', render);
document.getElementById('project-filter').addEventListener('change', render);
document.getElementById('sort').addEventListener('change', render);

load();
</script>
</body>
</html>
