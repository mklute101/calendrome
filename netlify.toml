[build]
  publish = "website"
  command = "npm ci --ignore-scripts --no-audit --no-fund && node scripts/extract-docs.mjs && cp dist/src/gui/public/docs.json website/docs.json"
  # Skip the build (and PR preview) unless the website or anything that
  # feeds the auto-generated /docs page changed. Keeps app PRs silent.
  ignore = "git diff --quiet HEAD^ HEAD -- website/ netlify.toml scripts/extract-docs.mjs src/db/schema.sql src/mcp/ src/gui/server.ts src/calendar-sync.ts src/categories.ts src/availability.ts src/db/connection.ts"

[build.environment]
  NODE_VERSION = "20"
